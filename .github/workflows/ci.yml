name: deropay-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sdk-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        # --frozen-lockfile: fail if bun.lock drifts from the manifests so CI
        # can't silently re-resolve. Regenerate the lock locally (IPv6 off to
        # dodge the VPN install hang) and commit it when a manifest changes.
        run: bun install --frozen-lockfile

      # Guard: the SQLite-backed suites import better-sqlite3 at module load and
      # have no skip fallback, so a missing native binding must fail loudly here
      # rather than surfacing as opaque import errors — and never be skipped.
      - name: Verify better-sqlite3 native binding built
        run: test -f packages/dero-pay/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          || (echo "::error::better-sqlite3 native binding missing — SQLite suites would not run" && exit 1)

      - name: Typecheck SDK
        run: bun run typecheck

      - name: Run SDK unit tests
        run: bun run --cwd packages/dero-pay test:unit

      - name: Verify subpath exports resolve (in-workspace smoke)
        run: bun run --cwd packages/dero-pay test:exports

      - name: Verify PUBLISHED exports resolve (pack + install outside workspace)
        run: npm run --prefix packages/dero-pay test:pack-exports

      - name: Build SDK
        run: bun run --cwd packages/dero-pay build
