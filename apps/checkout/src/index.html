<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay with DERO — DeroPay Checkout</title>
  <meta name="description" content="Complete your DERO payment securely." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M23,34.4v31.1l27,15.6,27-15.6v-31.1l-27-15.6-27,15.6ZM50,76.8l-6.1-3.5c.1-.8,2.3-14.4,2.4-15.8l-4.6-2.7v-9.6l8.3-4.8,8.3,4.8v9.6l-4.5,2.6c.2,1.4,2.3,15.1,2.4,15.8l-6.2,3.6ZM73.2,63.4l-13.4,7.7c0-.5-1.6-10.3-1.8-11.7l4.2-2.4v-14.1l-12.2-7-12.2,7v14.1l4.1,2.4c-.2,1.4-1.7,11.2-1.8,11.7l-13.3-7.7v-26.8l23.2-13.4,23.2,13.4v26.8Z' fill='%2310b981'/><path d='M50,.3L7,25.2v49.7l43,24.8,43-24.8V25.2L50,.3ZM77,65.6l-27,15.6-27-15.6v-31.1l27-15.6,27,15.6v31.1Z' fill='%23000'/><path d='M26.8,36.6v26.8l13.3,7.7c0-.4,1.6-10.3,1.8-11.7l-4.1-2.4v-14.1l12.2-7,12.2,7v14.1l-4.2,2.4c.2,1.4,1.7,11.2,1.8,11.7l13.4-7.7v-26.8l-23.2-13.4-23.2,13.4Z' fill='%23000'/><path d='M58.3,54.8v-9.6l-8.3-4.8-8.3,4.8v9.6l4.6,2.7c-.2,1.4-2.3,15-2.4,15.8l6.1,3.5,6.2-3.6c-.1-.7-2.2-14.4-2.4-15.8l4.5-2.6Z' fill='%23000'/></svg>" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="checkout-app">
    <div class="checkout-card">
      <div id="demo-banner" class="demo-banner hidden">Simulation — no real DERO is transferred</div>
      <div class="checkout-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M23,34.4v31.1l27,15.6,27-15.6v-31.1l-27-15.6-27,15.6ZM50,76.8l-6.1-3.5c.1-.8,2.3-14.4,2.4-15.8l-4.6-2.7v-9.6l8.3-4.8,8.3,4.8v9.6l-4.5,2.6c.2,1.4,2.3,15.1,2.4,15.8l-6.2,3.6ZM73.2,63.4l-13.4,7.7c0-.5-1.6-10.3-1.8-11.7l4.2-2.4v-14.1l-12.2-7-12.2,7v14.1l4.1,2.4c-.2,1.4-1.7,11.2-1.8,11.7l-13.3-7.7v-26.8l23.2-13.4,23.2,13.4v26.8Z" fill="#10b981"/><path d="M50,.3L7,25.2v49.7l43,24.8,43-24.8V25.2L50,.3ZM77,65.6l-27,15.6-27-15.6v-31.1l27-15.6,27,15.6v31.1Z" fill="#0a0a0a"/><path d="M26.8,36.6v26.8l13.3,7.7c0-.4,1.6-10.3,1.8-11.7l-4.1-2.4v-14.1l12.2-7,12.2,7v14.1l-4.2,2.4c.2,1.4,1.7,11.2,1.8,11.7l13.4-7.7v-26.8l-23.2-13.4-23.2,13.4Z" fill="#0a0a0a"/><path d="M58.3,54.8v-9.6l-8.3-4.8-8.3,4.8v9.6l4.6,2.7c-.2,1.4-2.3,15-2.4,15.8l6.1,3.5,6.2-3.6c-.1-.7-2.2-14.4-2.4-15.8l4.5-2.6Z" fill="#0a0a0a"/></svg>
          <span>DeroPay</span>
        </div>
      </div>

      <div id="loading-state" class="state">
        <div class="spinner"></div>
        <p>Loading invoice...</p>
      </div>

      <div id="payment-state" class="state hidden">
        <div class="invoice-name" id="invoice-name"></div>
        <div class="invoice-description" id="invoice-description"></div>

        <div class="qr-container">
          <div id="qr-code"></div>
        </div>

        <div class="amount-display">
          <span class="amount-value" id="dero-amount"></span>
          <span class="amount-label">DERO</span>
        </div>
        <div class="fiat-amount" id="fiat-amount"></div>

        <div class="address-container">
          <label>Send to this address:</label>
          <div class="address-box">
            <code id="payment-address"></code>
            <button id="copy-btn" class="copy-btn" title="Copy address">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>
        </div>

        <div class="status-bar">
          <div class="status-icon" id="status-icon">⏳</div>
          <div class="status-text" id="status-text">Waiting for payment...</div>
        </div>

        <div class="countdown" id="countdown"></div>

        <button id="simulate-btn" class="simulate-btn hidden">Simulate Payment</button>
      </div>

      <div id="success-state" class="state hidden">
        <div class="success-icon">✓</div>
        <h2>Payment Confirmed</h2>
        <p class="success-detail" id="success-detail"></p>
      </div>

      <div id="expired-state" class="state hidden">
        <div class="expired-icon">⏰</div>
        <h2>Invoice Expired</h2>
        <p>This payment link has expired. Please request a new one from the merchant.</p>
      </div>

      <div id="error-state" class="state hidden">
        <div class="error-icon">⚠</div>
        <h2>Error</h2>
        <p id="error-message"></p>
      </div>

      <div class="checkout-footer">
        Powered by <a href="https://deropay.com" target="_blank" rel="noopener">DeroPay</a> — Private payments on DERO
      </div>
    </div>
  </div>
  <script type="module" src="./checkout.ts"></script>
</body>
</html>
