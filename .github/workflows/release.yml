name: deropay-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SDK unit tests
        run: bun run --cwd packages/dero-pay test:unit

      - name: Build SDK
        run: bun run --cwd packages/dero-pay build

      - name: Build WooCommerce release zip
        run: bun run build:woocommerce

      - name: Attach WooCommerce zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: deropay-for-woocommerce.zip
          generate_release_notes: true
