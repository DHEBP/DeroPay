services:
  gateway:
    # Pull the prebuilt image by default; `docker compose build` still builds
    # from source. Pin a release with DEROPAY_TAG in .env (default: latest).
    image: ghcr.io/dhebp/deropay-gateway:${DEROPAY_TAG:-latest}
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3080:3080"
    environment:
      - DERO_WALLET_RPC_URL=http://wallet:10103/json_rpc
      # Bundled node by default; DERO_DAEMON_ADDRESS overrides both this and
      # the wallet's daemon (to go remote, also start only gateway + wallet).
      - DERO_DAEMON_RPC_URL=http://${DERO_DAEMON_ADDRESS:-daemon:10102}/json_rpc
      # Basic auth for the wallet RPC (must match WALLET_RPC_LOGIN below).
      - DERO_RPC_USERNAME=${DERO_RPC_USERNAME:-deropay}
      - DERO_RPC_PASSWORD=${DERO_RPC_PASSWORD:?set DERO_RPC_PASSWORD in .env}
      - DEROPAY_STORE=sqlite
      - DEROPAY_SQLITE_PATH=/app/data/deropay.db
      - DEROPAY_API_KEY=${DEROPAY_API_KEY}
      - DEROPAY_WEBHOOK_URL=${DEROPAY_WEBHOOK_URL:-}
      - DEROPAY_WEBHOOK_SECRET=${DEROPAY_WEBHOOK_SECRET:-}
    volumes:
      - gateway-data:/app/data
    depends_on:
      - wallet
    restart: unless-stopped

  # Merchant dashboard (Next.js). Ships in demo mode — the commerce views
  # render sample data. Flip to live per-session from the UI, which then hits
  # the wallet/daemon RPC wired below.
  dashboard:
    image: ghcr.io/dhebp/deropay-dashboard:${DEROPAY_TAG:-latest}
    build:
      context: ../../
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NEXT_PUBLIC_DEMO_MODE=true
      - WALLET_RPC_URL=http://wallet:10103/json_rpc
      - DAEMON_RPC_URL=http://${DERO_DAEMON_ADDRESS:-daemon:10102}/json_rpc
      - DERO_RPC_USERNAME=${DERO_RPC_USERNAME:-deropay}
      - DERO_RPC_PASSWORD=${DERO_RPC_PASSWORD:?set DERO_RPC_PASSWORD in .env}
    depends_on:
      - wallet
    restart: unless-stopped

  # DERO daemon — syncs the blockchain (built from the official release).
  # Default: a self-hosted node using --fastsync (a recent state snapshot,
  # not the multi-week full replay). To use a remote node instead, set
  # DERO_DAEMON_ADDRESS in .env and point the wallet at it.
  daemon:
    image: ghcr.io/dhebp/deropay-daemon:${DEROPAY_TAG:-latest}
    build:
      context: .
      dockerfile: docker/derod.Dockerfile
    command: ["--rpc-bind=0.0.0.0:10102", "--fastsync"]
    ports:
      # P2P — needed to find peers. RPC (10102) stays internal-only.
      - "10101:10101"
    volumes:
      - daemon-data:/root/.dero
    restart: unless-stopped

  # DERO wallet — receives payments (built from the official release).
  # Auto-creates a merchant wallet on first run and writes the recovery
  # seed to SEED-BACKUP.txt inside the wallet volume. BACK IT UP.
  wallet:
    image: ghcr.io/dhebp/deropay-wallet:${DEROPAY_TAG:-latest}
    build:
      context: .
      dockerfile: docker/wallet.Dockerfile
    environment:
      - WALLET_FILE=/wallet/merchant.db
      # Optional at-rest encryption. If set, the auto-created wallet is
      # encrypted with it; empty = unencrypted file (network-isolated + login).
      - WALLET_PASSWORD=${WALLET_PASSWORD:-}
      - DAEMON_ADDRESS=${DERO_DAEMON_ADDRESS:-daemon:10102}
      - RPC_BIND=0.0.0.0:10103
      - WALLET_RPC_LOGIN=${DERO_RPC_USERNAME:-deropay}:${DERO_RPC_PASSWORD:?set DERO_RPC_PASSWORD in .env}
    # NOTE: no host port mapping — the wallet RPC is reachable only by the
    # gateway over the internal Docker network (as wallet:10103). To run
    # test-router.ts from the host, uncomment the mapping below (dev only):
    # ports:
    #   - "127.0.0.1:10103:10103"
    volumes:
      - wallet-data:/wallet
    depends_on:
      - daemon
    restart: unless-stopped

volumes:
  gateway-data:
  daemon-data:
  wallet-data:
