name: Bug report
description: Report a defect in the SDK, gateway, or a plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first to avoid duplicates.
        Do not include private keys, seed phrases, wallet files, or `.env` contents in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug and its impact.
      placeholder: When I create an invoice with amount 0, the gateway returns a 500 instead of a validation error.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug. Include a code snippet or curl command where possible.
      placeholder: |
        1. Run `bun run dev:gateway`
        2. POST /invoices with `{ "amount": 0 }`
        3. Observe the response
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of DeroPay is affected?
      options:
        - SDK (packages/dero-pay)
        - Gateway (apps/gateway)
        - Plugin (WooCommerce / Medusa)
        - Checkout / Widget
        - Facilitator / x402 / agent
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DeroPay version
      description: SDK version (e.g. `dero-pay@0.4.0`) or the commit SHA you are running.
      placeholder: "dero-pay@0.4.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`. The SDK requires Node 20+.
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, package manager (bun / npm / pnpm), and whether you run against simulator, testnet, or mainnet.
      placeholder: "macOS 14, bun 1.3.14, testnet"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or stack traces. This is automatically formatted as code; scrub secrets first.
      render: shell
    validations:
      required: false
