name: deropay-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # bun install compiles better-sqlite3's native binding and fetches large
      # tarballs (next); both occasionally fail transiently on CI runners
      # ("Fail extracting tarball", "prebuild-install: command not found").
      # Retry with a cache clear so a one-off extraction hiccup can't sink a
      # tagged release.
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            # --frozen-lockfile: a tagged release must build from the exact
            # committed bun.lock, never a runner-side re-resolution.
            if bun install --frozen-lockfile; then
              exit 0
            fi
            echo "::warning::bun install failed (attempt $attempt) — clearing cache and retrying"
            bun pm cache rm || true
            sleep 10
          done
          echo "::error::bun install failed after 3 attempts"
          exit 1

      # The unit suite includes SQLite-backed tests that import better-sqlite3
      # at module load with no skip fallback — a missing native binding must
      # fail loudly here, not as an opaque import error mid-test (parity with ci.yml).
      - name: Verify better-sqlite3 native binding built
        run: test -f packages/dero-pay/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          || (echo "::error::better-sqlite3 native binding missing — SQLite suites would not run" && exit 1)

      - name: Run SDK unit tests
        run: bun run --cwd packages/dero-pay test:unit

      - name: Build SDK
        run: bun run --cwd packages/dero-pay build

      - name: Build WooCommerce release zip
        run: bun run build:woocommerce

      - name: Attach WooCommerce zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: deropay-for-woocommerce.zip
          generate_release_notes: true
